<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Portfolio{% endblock %}</title>
  {% block stylesheets %}<link rel="stylesheet" href="static/style.css">{% endblock %}
  {% block feed_link %}<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="atom.xml">{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <span class="site-header__name"><a href="{% block home_href %}index.html{% endblock %}">{{ site.title }}</a></span>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    {{ site.footer | safe }}
  </footer>
</body>
</html>
